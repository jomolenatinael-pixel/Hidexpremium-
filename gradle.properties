# Project-wide Gradle settings.
# For more details, visit http://www.gradle.org/docs/current/userguide/build_environment.html

# JVM arguments for the daemon process — tuned for limited-memory CI environments.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Parallel build disabled to reduce peak memory pressure on low-RAM hosts.
org.gradle.parallel=false

# Kotlin code style
kotlin.code.style=official

# Reduces R class size for each library.
android.nonTransitiveRClass=true

# Build cache enabled.
org.gradle.caching=true

# Configuration cache disabled — it caused file-system watch issues in the sandbox.
org.gradle.configuration-cache=false

# Single worker to minimise memory pressure.
org.gradle.workers.max=1

# Kotlin compiler in-process to avoid "Could not connect to Kotlin compile daemon".
kotlin.compiler.execution.strategy=in-process

# Allow the google-services plugin to work without google-services.json.
googleServices.missing.passthrough=true

# Keep the daemon idle for longer to speed up repeated builds.
org.gradle.daemon.idletimeout=3600000
